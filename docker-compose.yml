version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: kas_gunungsari_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: kas_gunungsari
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
